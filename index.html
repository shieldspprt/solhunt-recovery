<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover" />

  <!-- PWA -->
  <meta name="theme-color" content="#09090b" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SolHunt" />

  <!-- iOS Safari: stop auto-detection of phone numbers, addresses, and dates.
       Without this, iOS Safari wraps any base58 sequence that looks vaguely
       numeric — including the leading digits of common Solana wallet addresses
       (e.g. "7vfC...9X9") — in a <a href="tel:..."> tag. That linkified DOM
       node breaks copy-paste into the wallet scanner input on the next page.
       telephone=no disables phone detection globally, which is correct for a
       wallet recovery tool — no legitimate phone-number use case exists. -->
  <meta name="format-detection" content="telephone=no" />
  <!-- SolHunt is a dark-only product. Declaring color-scheme: dark tells
       iOS Safari and Chromium to render scrollbars, form controls, and
       the address-bar background against a dark palette instead of
       briefly flashing white while the React app boots. Also forces the
       browser to use the dark theme for native UI even when the user's
       OS-level appearance is set to light. -->
  <meta name="color-scheme" content="dark" />

  <!-- SEO -->
  <title>SolHunt | Recover Locked SOL</title>
  <meta name="description"
    content="Recover locked SOL, reclaim rent, revoke risky approvals, and harvest unclaimed LP fees, staking tickets, MEV rewards, cNFT accounts, and buffer accounts — client-side and non-custodial." />

  <!-- Open Graph -->
  <meta property="og:title" content="SolHunt | Recover Locked SOL" />
  <meta property="og:description"
    content="Recover locked SOL, reclaim rent, revoke risky approvals, and harvest unclaimed LP fees, staking tickets, MEV rewards, cNFT accounts, and buffer accounts — client-side and non-custodial." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://solhunt.dev" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:image" content="https://solhunt.dev/solhunt_og_preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="SolHunt — Recover Locked SOL from your Solana wallet. Client-side, non-custodial, and secure." />
  <meta property="og:image:secure_url" content="https://solhunt.dev/solhunt_og_preview.png" />
  <meta property="og:site_name" content="SolHunt" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@solhuntdev" />
  <meta name="twitter:creator" content="@solhuntdev" />
  <meta name="twitter:title" content="SolHunt | Recover Locked SOL" />
  <meta name="twitter:description" content="Recover locked SOL, reclaim rent, revoke risky approvals, and harvest unclaimed LP fees, staking tickets, MEV rewards, cNFT accounts, and buffer accounts — client-side and non-custodial." />
  <meta name="twitter:image" content="https://solhunt.dev/solhunt_og_preview.png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://solhunt.dev" />

  <!-- Robots -->
  <!-- Robots — global default is index, follow. Pages can override via JS (e.g., ScanPage). -->
  <meta name="robots" content="index, follow" />
  <!-- ScanPage and other wallet-specific pages inject noindex via JS for privacy. -->

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400..800&display=swap" rel="stylesheet">
</head>

<body class="bg-shield-bg text-shield-text font-sans antialiased">
  <main role="main">
    <div id="root"></div>
  </main>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
