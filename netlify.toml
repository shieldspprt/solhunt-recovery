[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Route API calls to Netlify functions
[[redirects]]
  from = "/api/dd-sign"
  to = "/.netlify/functions/dd-sign"
  status = 200

[[redirects]]
  from = "/api/dd-payment"
  to = "/.netlify/functions/dd-payment"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200

[[redirects]]
  from = "/mcp/*"
  to = "/.netlify/functions/mcp"
  status = 200

# Serve MCP server card as static JSON (must be before SPA redirect)
[[redirects]]
  from = "/.well-known/mcp/*"
  to = "/.well-known/mcp/:splat"
  status = 200

# Serve agent.json as static JSON
[[redirects]]
  from = "/.well-known/agent.json"
  to = "/.well-known/agent.json"
  status = 200
  
# Serve assetlinks.json for TWA domain verification (must be before SPA redirect)
[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.well-known/assetlinks.json"
  status = 200

# Serve PWA manifest (must be before SPA redirect)
[[redirects]]
  from = "/manifest.webmanifest"
  to = "/manifest.webmanifest"
  status = 200

# SPA routing: redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers per Audit Spec §2.9, §9.1
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://*.helius-rpc.com wss://*.helius-rpc.com https://api.mainnet-beta.solana.com https://api.devnet.solana.com https://*.firebaseio.com https://*.googleapis.com https://api.dexscreener.com https://transaction-v1.raydium.io https://api-v3.raydium.io https://api.jup.ag https://lite-api.jup.ag https://price.jup.ag https://quote-api.jup.ag https://dlmm-api.meteora.ag https://api-mainnet.magiceden.dev https://sanctum-extra-api.ngrok.dev https://mainnet.block-engine.jito.wtf https://arweave.net https://nftstorage.link https://ipfs.io https://cloudflare-ipfs.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src * data:; manifest-src 'self'; worker-src 'self';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prevent caching of HTML (ensures latest version always served)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# MCP server card headers
[[headers]]
  for = "/.well-known/mcp/*"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/agent.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/openapi.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[functions."daily-stats"]
  schedule = "0 9 * * *"
